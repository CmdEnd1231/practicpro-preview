<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PracticPRO - înregistrare</title>
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div class="funding-strip"><div class="wrap funding-row"><div class="funding-note"><img class="eu-emblem" src="media/eu-flag.svg" alt="Emblema Uniunii Europene"><span><span class="funding-title">Cofinanțat de<br>Uniunea Europeană</span><span class="funding-subtitle">Fondul Social European Plus (FSE+)</span></span></div><img class="project-logo" src="logo-general-transparent.png" alt="PracticPRO"><div class="official-logos"><img class="government-logo" src="media/guvern-romaniei.svg" alt="Guvernul Romîniei"></div></div></div>
  <nav class="nav"><div class="wrap nav-row"><a href="index.html" class="brand"><img class="brand-logo" src="logo-general-transparent.png" alt="PracticPRO"></a><div class="nav-links"><a href="elevi.html">Elevi</a><a href="companii.html">Companii</a><a href="scoli.html">Școli</a><a href="resources.html">Resurse</a><a href="events.html">Evenimente</a><a href="contact.html">Contact</a></div><div class="nav-actions"><a class="btn admin-demo" href="superadmin.html">SuperAdmin</a><a class="btn outline" href="login.html">Conectare</a></div></div></nav>
  <main class="auth-shell">
    <section class="wrap">
      <form class="auth-card">
        <h1 data-editable="register-title">înregistrare</h1>
        <p data-editable="register-copy">Completează datele de bază și alege tipul de cont. Fluxul final va valida rolul în funcție de regulile platformei.</p>
        <div class="form-grid">
          <div class="field"><label data-editable="register-label-account-type">Tip cont</label><select data-account-type><option value="student">Elev</option><option value="company">Companie</option><option value="school">școala / profesor</option></select></div>
          <div class="role-fields" data-role-fields="student">
            <div class="field"><label data-editable="register-label-student-name">Nume complet</label><input type="text" placeholder="Nume și prenume"></div>
            <div class="field"><label data-editable="register-label-email">Email</label><input type="email" placeholder="nume@email.ro"></div>
            <div class="field"><label data-editable="register-label-phone">Telefon</label><input type="tel" placeholder="+40..."></div>
            <div class="field"><label data-editable="register-label-password">Parolă</label><input type="password" placeholder="Alege o parolă"></div>
          </div>
          <div class="role-fields is-hidden" data-role-fields="company">
            <div class="field"><label data-editable="register-label-company-name">Nume companie</label><input type="text" placeholder="Denumirea companiei"></div>
            <div class="field"><label data-editable="register-label-company-cui">CUI</label><input type="text" placeholder="RO12345678"></div>
            <div class="field"><label data-editable="register-label-email">Email</label><input type="email" placeholder="contact@companie.ro"></div>
            <div class="field"><label data-editable="register-label-phone">Telefon</label><input type="tel" placeholder="+40..."></div>
            <div class="field"><label data-editable="register-label-password">Parolă</label><input type="password" placeholder="Alege o parolă"></div>
          </div>
          <div class="role-fields is-hidden" data-role-fields="school">
            <div class="field"><label data-editable="register-label-school-name">Denumire instituție de învățământ</label><input type="text" placeholder="Denumirea școlii sau liceului"></div>
            <div class="field"><label data-editable="register-label-email">Email</label><input type="email" placeholder="contact@scoala.ro"></div>
            <div class="field"><label data-editable="register-label-phone">Telefon</label><input type="tel" placeholder="+40..."></div>
            <div class="field"><label data-editable="register-label-password">Parolă</label><input type="password" placeholder="Alege o parolă"></div>
          </div>
          <a class="btn primary" href="login.html" data-editable="register-button-submit">Creează cont</a>
          <a class="btn outline" href="login.html" data-editable="register-button-login">Am deja cont</a>
        </div>
      </form>
    </section>
  </main>
  <script src="admin-cms.js"></script>
</body>
</html>
