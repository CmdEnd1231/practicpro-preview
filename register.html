<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PracticPRO - Inregistrare</title>
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div class="funding-strip"><div class="wrap funding-row"><div class="funding-note"><img class="eu-emblem" src="media/eu-flag.svg" alt="Emblema Uniunii Europene"><span><span class="funding-title">Cofinantat de<br>Uniunea Europeana</span><span class="funding-subtitle">Fondul Social European Plus (FSE+)</span></span></div><img class="project-logo" src="logo-header.png" alt="PracticPRO"><div class="official-logos"><img class="government-logo" src="media/guvern-romaniei.svg" alt="Guvernul Romaniei"></div></div></div>
  <nav class="nav"><div class="wrap nav-row"><a href="index.html" class="brand"><img class="brand-logo" src="logo-header.png" alt="PracticPRO"></a><div class="nav-links"><a href="elevi.html">Elevi</a><a href="companii.html">Companii</a><a href="scoli.html">Scoli</a><a href="resources.html">Resurse</a><a href="events.html">Evenimente</a><a href="contact.html">Contact</a></div><div class="nav-actions"><a class="btn admin-demo" href="superadmin.html">SuperAdmin</a><a class="btn outline" href="login.html">Conectare</a></div></div></nav>
  <main class="auth-shell">
    <section class="wrap">
      <form class="auth-card">
        <h1>Inregistrare</h1>
        <p>Completeaza datele de baza si alege tipul de cont. Fluxul final va valida rolul in functie de regulile platformei.</p>
        <div class="form-grid">
          <div class="field"><label>Tip cont</label><select data-account-type><option value="student">Elev</option><option value="company">Companie</option><option value="school">Scoala / profesor</option></select></div>
          <div class="role-fields" data-role-fields="student">
            <div class="field"><label>Nume complet</label><input type="text" placeholder="Nume si prenume"></div>
            <div class="field"><label>Email</label><input type="email" placeholder="nume@email.ro"></div>
            <div class="field"><label>Telefon</label><input type="tel" placeholder="+40..."></div>
            <div class="field"><label>Parola</label><input type="password" placeholder="Alege o parola"></div>
          </div>
          <div class="role-fields is-hidden" data-role-fields="company">
            <div class="field"><label>Nume companie</label><input type="text" placeholder="Denumirea companiei"></div>
            <div class="field"><label>CUI</label><input type="text" placeholder="RO12345678"></div>
            <div class="field"><label>Email</label><input type="email" placeholder="contact@companie.ro"></div>
            <div class="field"><label>Telefon</label><input type="tel" placeholder="+40..."></div>
            <div class="field"><label>Parola</label><input type="password" placeholder="Alege o parola"></div>
          </div>
          <div class="role-fields is-hidden" data-role-fields="school">
            <div class="field"><label>Denumire institutie de invatamant</label><input type="text" placeholder="Denumirea scolii sau liceului"></div>
            <div class="field"><label>Email</label><input type="email" placeholder="contact@scoala.ro"></div>
            <div class="field"><label>Telefon</label><input type="tel" placeholder="+40..."></div>
            <div class="field"><label>Parola</label><input type="password" placeholder="Alege o parola"></div>
          </div>
          <a class="btn primary" href="login.html">Creeaza cont demo</a>
          <a class="btn outline" href="login.html">Am deja cont</a>
        </div>
      </form>
    </section>
  </main>
  <script src="admin-cms.js"></script>
</body>
</html>
