<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PracticPRO - Conectare</title>
  <link rel="stylesheet" href="site.css" />
</head>
<body>
  <div class="funding-strip"><div class="wrap funding-row"><div class="funding-note"><img class="eu-emblem" src="media/eu-flag.svg" alt="Emblema Uniunii Europene"><span><span class="funding-title">Cofinanțat de<br>Uniunea Europeană</span><span class="funding-subtitle">Fondul Social European Plus (FSE+)</span></span></div><img class="project-logo" src="logo-general-transparent.png" alt="PracticPRO"><div class="official-logos"><img class="government-logo" src="media/guvern-romaniei.svg" alt="Guvernul Romîniei"></div></div></div>
  <nav class="nav"><div class="wrap nav-row"><a href="index.html" class="brand"><img class="brand-logo" src="logo-general-transparent.png" alt="PracticPRO"></a><div class="nav-links"><a href="elevi.html">Elevi</a><a href="companii.html">Companii</a><a href="scoli.html">Școli</a><a href="resources.html">Resurse</a><a href="events.html">Evenimente</a><a href="contact.html">Contact</a></div><div class="nav-actions"><a class="btn admin-demo" href="superadmin.html">SuperAdmin</a><a class="btn primary" href="register.html">înregistrare</a></div></div></nav>
  <main class="auth-shell">
    <section class="wrap">
      <form class="auth-card">
        <h1 data-editable="login-title">Conectare</h1>
        <p data-editable="login-copy">Alege rolul contului tău și conectează-te în zona potrivită.</p>
        <div class="auth-options" data-login-role-options>
          <button class="auth-option active" type="button" data-login-target="student.html" data-editable="login-role-student">Elev</button>
          <button class="auth-option" type="button" data-login-target="company.html" data-editable="login-role-company">Companie</button>
          <button class="auth-option" type="button" data-login-target="teacher-school.html" data-editable="login-role-school">Școala</button>
        </div>
        <div class="form-grid">
          <div class="field"><label data-editable="login-label-email">Email</label><input type="email" placeholder="nume@email.ro"></div>
          <div class="field"><label data-editable="login-label-password">Parolă</label><input type="password" placeholder="Parolă"></div>
          <a class="btn primary" href="student.html" data-login-submit data-editable="login-button-submit">Intră în cont</a>
          <a class="btn outline" href="register.html" data-editable="login-button-register">Nu ai cont? Înregistrează-te</a>
        </div>
      </form>
    </section>
  </main>
  <script src="admin-cms.js"></script>
</body>
</html>
